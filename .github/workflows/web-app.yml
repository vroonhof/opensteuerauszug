# Builds the standalone single-file web app (Pyodide based), uploads it
# as a workflow artifact and, on pushes to main, deploys it to GitHub
# Pages. See docs/webapp.md.

name: Web app

on:
  push:
    branches: [ "main" ]
  pull_request:
    paths:
      - "web/**"
      - "scripts/build_web_app.py"
      - "src/opensteuerauszug/util/web_runner.py"
      - "pyproject.toml"
      - "uv.lock"
      - "pylock.toml"
      - ".github/workflows/web-app.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.10.10"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --locked --extra dev
      - name: Build single-file web app
        run: uv run --locked --extra dev python scripts/build_web_app.py --output dist/web/opensteuerauszug.html
      - name: Smoke test in headless Chromium
        run: |
          npm install playwright
          npx playwright install --with-deps chromium
          node web/dev/e2e_smoke.mjs dist/web/opensteuerauszug.html
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: opensteuerauszug-webapp
          path: dist/web/opensteuerauszug.html
          if-no-files-found: error

  # Publish the app to GitHub Pages so users get a stable URL instead of
  # digging through workflow artifacts. Runs only for the main branch.
  deploy:
    needs: build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download built app
        uses: actions/download-artifact@v4
        with:
          name: opensteuerauszug-webapp
          path: _site
      - name: Serve the app at the site root
        run: cp _site/opensteuerauszug.html _site/index.html
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
