# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        version: "0.10.10"
        enable-cache: true
    - name: Install dependencies
      run: uv sync --locked --extra dev
    - name: Check lock files
      run: |
        ./scripts/update_lockfiles.sh --check
        git diff --exit-code -- uv.lock pylock.toml
    - name: Lint with flake8
      id: lint
      continue-on-error: true
      run: |
        # stop the build if there are Python syntax errors, undefined names, or unused imports
        uv run --locked --extra dev flake8 . --count --select=E9,F63,F7,F82,F401 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        uv run --locked --extra dev flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Type-check with pyrefly
      id: typecheck
      continue-on-error: true
      run: uv run --locked --extra dev pyrefly check src
    - name: Test with pytest
      id: test
      continue-on-error: true
      run: uv run --locked --extra dev pytest
    - name: Check all steps passed
      if: always()
      run: |
        result=0
        if [ "${{ steps.lint.outcome }}" != "success" ]; then
          echo "Lint failed"
          result=1
        fi
        if [ "${{ steps.typecheck.outcome }}" != "success" ]; then
          echo "Type-check failed"
          result=1
        fi
        if [ "${{ steps.test.outcome }}" != "success" ]; then
          echo "Tests failed"
          result=1
        fi
        exit $result
