# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest uv
        pip install -e ".[dev]"
        pip install git+https://github.com/vroonhof/pdf417-py.git
        pip install git+https://github.com/vroonhof/pdf417decoder.git#subdirectory=python
    - name: Check uv lockfile
      run: |
        uv lock --locked
    - name: Lint with flake8
      id: lint
      continue-on-error: true
      run: |
        # stop the build if there are Python syntax errors, undefined names, or unused imports
        flake8 . --count --select=E9,F63,F7,F82,F401 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Type-check with pyrefly
      id: typecheck
      continue-on-error: true
      run: pyrefly check src
    - name: Test with pytest
      id: test
      continue-on-error: true
      run: |
        pytest
    - name: Check all steps passed
      if: always()
      run: |
        result=0
        if [ "${{ steps.lint.outcome }}" != "success" ]; then
          echo "Lint failed"
          result=1
        fi
        if [ "${{ steps.typecheck.outcome }}" != "success" ]; then
          echo "Type-check failed"
          result=1
        fi
        if [ "${{ steps.test.outcome }}" != "success" ]; then
          echo "Tests failed"
          result=1
        fi
        exit $result
